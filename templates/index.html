<!DOCTYPE html>
<html>
<head>
    <title>AI Study Planner</title>
</head>
<body>

<div class="container">
    <h1>🤖 AI Study Planner</h1>

    <!-- TOTAL HOURS -->
    <label>Total Study Hours:</label><br>
    <input type="number" id="hoursInput" placeholder="Enter hours" required><br><br>

    <!-- EXAM DAYS -->
    <label>Exam in (days):</label><br>
    <input type="number" id="examInput" placeholder="Enter days" required><br><br>

    <!-- SEARCH -->
    <input type="text" id="search" placeholder="🔍 Search subject..." onkeyup="filterSubjects()"><br><br>

    <!-- FORM -->
    <form action="/generate" method="POST" enctype="multipart/form-data">

        <input type="hidden" name="hours" id="hiddenHours">
        <input type="hidden" name="exam_days" id="hiddenExam">

        <!-- SUBJECT LIST -->
        <div id="subjectList"></div>

        <br>

        <!-- DATE SHEET UPLOAD -->
        <label>Upload Datesheet 📄:</label><br>
        <input type="file" name="datesheet" accept="image/*"><br><br>

        <button type="submit" onclick="prepareForm()">Generate Plan 🚀</button>

    </form>
</div>

<script>
let subjects = [
    "Maths","Physics","Chemistry","Biology","English","Hindi",
    "Computer","DBMS","OS","Java","Python","C++","Accounts",
    "Economics","History","Geography"
];

function loadSubjects() {
    let container = document.getElementById("subjectList");
    container.innerHTML = "";

    subjects.forEach(sub => {
        container.innerHTML += `
            <div>
                <input type="checkbox" name="subjects" value="${sub}">
                ${sub}
                Difficulty:
                <select name="difficulty_${sub}">
                    <option>Easy</option>
                    <option>Medium</option>
                    <option>Hard</option>
                </select>
                Priority:
                <select name="priority_${sub}">
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                </select>
            </div>
            <br>
        `;
    });
}

function filterSubjects() {
    let search = document.getElementById("search").value.toLowerCase();
    let items = document.querySelectorAll("#subjectList div");

    items.forEach(item => {
        if (item.innerText.toLowerCase().includes(search)) {
            item.style.display = "block";
        } else {
            item.style.display = "none";
        }
    });
}

function prepareForm() {
    document.getElementById("hiddenHours").value = document.getElementById("hoursInput").value;
    document.getElementById("hiddenExam").value = document.getElementById("examInput").value;
}

window.onload = loadSubjects;
</script>

</body>
</html>
