<!DOCTYPE html>
<html>
<head>
    <title>AI Study Planner</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>🤖 AI Study Planner</h1>

    <!-- TOTAL HOURS -->
    <label>Total Study Hours:</label>
    <input type="number" name="hours" id="hours" required>

    <br><br>

    <!-- EXAM DAYS -->
    <label>Exam in (days):</label>
    <input type="number" name="exam_days" id="exam_days" required>

    <br><br>

    <!-- SEARCH -->
    <input type="text" id="search" placeholder="🔍 Search subject..." onkeyup="filterSubjects()">

    <form action="/generate" method="POST">

        <input type="hidden" name="hours" id="hiddenHours">
        <input type="hidden" name="exam_days" id="hiddenExam">

        <div id="subjectList">

            <!-- Subjects dynamically -->
        </div>

        <br>
        <button type="submit" onclick="prepareForm()">Generate Plan 🚀</button>

    </form>

</div>

<script>

let subjects = [
"Maths","Physics","Chemistry","Biology","English","Hindi",
"Computer","DBMS","OS","Networking","Python","Java",
"C++","AI","ML","Data Science","Web Dev","Cloud",
"Cyber Security","Aptitude","Reasoning","GK"
];

// render subjects
function renderSubjects() {

    let html = "";

    subjects.forEach(sub => {
        html += `
        <div class="subject-item">

            <input type="checkbox" name="selected_subjects" value="${sub}" onclick="toggleOptions('${sub}')"> ${sub}

            <div id="opt-${sub}" style="display:none;">

                Difficulty:
                <select name="difficulty_${sub}">
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="hard">Hard</option>
                </select>

                Priority:
                <select name="priority_${sub}">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3" selected>3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>

            </div>
        </div>
        <br>
        `;
    });

    document.getElementById("subjectList").innerHTML = html;
}

// show options
function toggleOptions(sub) {
    let el = document.getElementById("opt-" + sub);
    el.style.display = (el.style.display === "none") ? "block" : "none";
}

// search
function filterSubjects() {
    let val = document.getElementById("search").value.toLowerCase();
    let items = document.getElementsByClassName("subject-item");

    for (let i = 0; i < items.length; i++) {
        let text = items[i].innerText.toLowerCase();
        items[i].style.display = text.includes(val) ? "block" : "none";
    }
}

// pass values
function prepareForm() {
    document.getElementById("hiddenHours").value =
        document.getElementById("hours").value;

    document.getElementById("hiddenExam").value =
        document.getElementById("exam_days").value;
}

renderSubjects();

</script>

</body>
</html>
