<!DOCTYPE html>
<html>
<head>
    <title>AI Study Planner</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>🤖 AI Study Planner</h1>

    <form action="/generate" method="POST">

        <label>Total Study Hours:</label>
        <input type="number" name="hours" required>

        <h3>Select Subjects:</h3>

        <div class="subject-box">

            <!-- SUBJECT 1 -->
            <div>
                <input type="checkbox" name="selected_subjects" value="Maths"> Maths

                <br>

                Difficulty:
                <select name="difficulty_Maths">
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="hard">Hard</option>
                </select>

                Priority:
                <select name="priority_Maths">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3" selected>3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
            </div>

            <br>

            <!-- SUBJECT 2 -->
            <div>
                <input type="checkbox" name="selected_subjects" value="Physics"> Physics

                <br>

                Difficulty:
                <select name="difficulty_Physics">
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="hard">Hard</option>
                </select>

                Priority:
                <select name="priority_Physics">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3" selected>3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
            </div>

            <br>

            <!-- SUBJECT 3 -->
            <div>
                <input type="checkbox" name="selected_subjects" value="English"> English

                <br>

                Difficulty:
                <select name="difficulty_English">
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="hard">Hard</option>
                </select>

                Priority:
                <select name="priority_English">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3" selected>3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
            </div>

        </div>

        <br>

        <button type="submit">Generate Plan 🚀</button>

    </form>

</div>

</body>
</html>
