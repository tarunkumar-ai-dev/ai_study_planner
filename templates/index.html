<!DOCTYPE html>
<html>
<head>
    <title>AI Study Planner</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">
    <h1>🤖 AI Study Planner</h1>

    <!-- TOTAL HOURS -->
    <label>Total Study Hours:</label><br>
    <input type="number" id="hoursInput" placeholder="Enter hours" required><br><br>

    <!-- SEARCH -->
    <input type="text" id="search" placeholder="🔍 Search subject..." onkeyup="filterSubjects()"><br><br>

    <!-- FORM -->
    <form action="/generate" method="POST" enctype="multipart/form-data">

        <input type="hidden" name="hours" id="hiddenHours">

        <!-- SUBJECT LIST -->
        <div id="subjectList"></div>

        <br>

        <!-- DATE SHEET UPLOAD -->
        <label>Upload Date Sheet 📄:</label><br>
        <input type="file" name="datesheet" accept="image/*" required><br><br>

        <button type="submit" onclick="prepareForm()">Generate Plan 🚀</button>

    </form>
</div>

<script>

let subjects = [
    "Maths","Physics","Chemistry","Biology","English","Hindi",
    "Computer","DBMS","OS","Java","Python","C++","Networking",
    "AI","ML","Data Science","Statistics","Economics","Accounts"
];

// CREATE SUBJECT LIST
function renderSubjects(list) {
    let html = "";

    list.forEach(sub => {
        html += `
        <div class="subject">
            <input type="checkbox" name="selected_subjects" value="${sub}"> ${sub}

            <br>

            Difficulty:
            <select name="difficulty_${sub}">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
            </select>

            Priority:
            <select name="priority_${sub}">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3" selected>3</option>
                <option value="4">4</option>
                <option value="5">5</option>
            </select>

            <hr>
        </div>
        `;
    });

    document.getElementById("subjectList").innerHTML = html;
}

// SEARCH FUNCTION
function filterSubjects() {
    let input = document.getElementById("search").value.toLowerCase();

    let filtered = subjects.filter(sub =>
        sub.toLowerCase().includes(input)
    );

    renderSubjects(filtered);
}

// INITIAL LOAD
renderSubjects(subjects);

// SEND HOURS
function prepareForm() {
    let hours = document.getElementById("hoursInput").value;
    document.getElementById("hiddenHours").value = hours;
}

</script>

</body>
</html>
