<!DOCTYPE html>
<html>
<head>
    <title>Study Plan</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>🔥 Your Study Plan</h1>
    <p>💪 Keep going!</p>

    <!-- ✅ Reason Input -->
    <div style="margin:20px;">
        <input type="text" id="reason" placeholder="Reason (if skipping)">
    </div>

    <table border="1" cellpadding="10">
        <thead>
            <tr>
                <th>Subject</th>
                <th>Morning 🌅</th>
                <th>Afternoon ☀️</th>
                <th>Night 🌙</th>
            </tr>
        </thead>

        <tbody>
        {% for row in plan %}
        <tr>

            <td>{{ row.subject }}</td>

            <!-- 🌅 MORNING -->
            <td>
                {{ row.morning }}
                <br>
                <button onclick="startTimer({{ loop.index0 }}, 'morning')">▶</button>
                <span id="m-{{ loop.index0 }}">❌</span>
            </td>

            <!-- ☀️ AFTERNOON -->
            <td>
                {{ row.afternoon }}
                <br>
                <button onclick="checkAndStart({{ loop.index0 }}, 'afternoon')">▶</button>
                <span id="a-{{ loop.index0 }}">❌</span>
            </td>

            <!-- 🌙 NIGHT -->
            <td>
                {{ row.night }}
                <br>
                <button onclick="checkNight({{ loop.index0 }})">▶</button>
                <span id="n-{{ loop.index0 }}">❌</span>
            </td>

        </tr>
        {% endfor %}
        </tbody>
    </table>

    <!-- ⏱ Timer Display -->
    <h2 id="timer">Timer: 00:00</h2>

</div>

<!-- 🔥 JAVASCRIPT -->
<script>

let timers = {};

function startTimer(index, type) {

    let cellId;
    let timeText;

    if (type === "morning") {
        cellId = "m-" + index;
        timeText = document.querySelectorAll("tbody tr")[index].cells[1].innerText;
    }
    else if (type === "afternoon") {
        cellId = "a-" + index;
        timeText = document.querySelectorAll("tbody tr")[index].cells[2].innerText;
    }
    else {
        cellId = "n-" + index;
        timeText = document.querySelectorAll("tbody tr")[index].cells[3].innerText;
    }

    let minutes = parseInt(timeText);
    let seconds = minutes * 60;

    if (timers[cellId]) {
        clearInterval(timers[cellId]);
    }

    timers[cellId] = setInterval(() => {

        if (seconds <= 0) {
            clearInterval(timers[cellId]);

            document.getElementById(cellId).innerText = "✔️";

            // 🔊 Beep
            let audio = new Audio("https://www.soundjay.com/buttons/beep-01a.mp3");
            audio.play();

        } else {
            seconds--;

            document.getElementById("timer").innerText =
                "Timer: " + formatTime(seconds);
        }

    }, 1000);
}

function checkAndStart(index, type) {

    let morningStatus = document.getElementById("m-" + index).innerText;
    let reason = document.getElementById("reason").value;

    if (morningStatus !== "✔️") {

        if (reason.trim() === "") {
            alert("⚠️ Pehle Morning complete karo ya reason likho!");
            return;
        } else {
            alert("⚠️ Morning skip kiya\nReason: " + reason);
        }
    }

    startTimer(index, type);
}

function checkNight(index) {

    let afternoonStatus = document.getElementById("a-" + index).innerText;
    let reason = document.getElementById("reason").value;

    if (afternoonStatus !== "✔️") {

        if (reason.trim() === "") {
            alert("⚠️ Pehle Afternoon complete karo ya reason likho!");
            return;
        } else {
            alert("⚠️ Afternoon skip kiya\nReason: " + reason);
        }
    }

    startTimer(index, 'night');
}

function formatTime(sec) {
    let m = Math.floor(sec / 60);
    let s = sec % 60;
    return m + ":" + (s < 10 ? "0" : "") + s;
}

</script>

</body>
</html>
